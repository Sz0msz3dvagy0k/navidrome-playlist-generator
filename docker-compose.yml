services:
  postgres:
    image: postgres:16
    container_name: playlist-postgres
    environment:
      POSTGRES_DB: playlist
      POSTGRES_USER: playlist
      POSTGRES_PASSWORD: playlist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  playlist-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playlist-generator
    depends_on:
      - postgres
    environment:
      APP_HOST: $(APP_HOST)
      APP_PORT: $(APP_PORT)
      DATABASE_URL: $(DATABASE_URL)
      SUBSONIC_BASE_URL: $(SUBSONIC_BASE)
      SUBSONIC_USERNAME: $(SUBSONIC_USERNAME)
      SUBSONIC_PASSWORD: $(SUBSONIC_PASSWORD)
      LASTFM_API_KEY: $(LASTFM_API_KEY)
      LASTFM_USERNAME: $(LASTFM_USERNAME)
      PLAYLIST_SIZE: $(PLAYLIST_SIZE)
      RUST_LOG: $(RUST_LOG)
    ports:
      - "8080:8080"

volumes:
  postgres_data:
